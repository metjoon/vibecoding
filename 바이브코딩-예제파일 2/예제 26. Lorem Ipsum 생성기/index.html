<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-mesh"></div>
    <nav class="global-nav">
        <a href="https://nanalab.kr/apps" class="logo-link">
            <img src="https://cdn.jsdelivr.net/gh/NaNaCompany/src_cdn@main/logo/logo.png" alt="Nanalab Logo">
        </a>
        <div class="nav-title">Lorem Ipsum Generator</div>
    </nav>
    <div class="container">
        <div class="card glass">
            <header>
                <h1>Lorem Ipsum Generator</h1>
                <p class="subtitle">Generate dummy text with style</p>
            </header>

            <div class="controls">
                <div class="slider-container">
                    <label for="lengthSlider" class="slider-label">Length: <span id="charCountValue">150</span>
                        chars</label>
                    <input type="range" id="lengthSlider" min="10" max="5000" value="150" class="slider">
                </div>
            </div>

            <div class="output-area">
                <p id="loremText"></p>
                <button id="copyBtn" class="icon-btn" aria-label="Copy text">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
