<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png"
        href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
</head>

<body>

    <nav class="global-header">
        <a href="https://nanalab.kr/apps" class="logo-link">
            <img src="https://cdn.jsdelivr.net/gh/NaNaCompany/src_cdn@latest/logo/logo.png" alt="NaNaLab Logo">
        </a>
        <div class="header-title">BMI</div>
    </nav>

    <div class="container">
        <header>
            <h1>BMI Calculator</h1>
            <p class="subtitle">Body Mass Index & Target Weight Analysis</p>
        </header>

        <div class="calculator-form">
            <div class="gender-toggle">
                <label class="gender-option">
                    <input type="radio" name="gender" value="male" checked>
                    <span>Male</span>
                </label>
                <label class="gender-option">
                    <input type="radio" name="gender" value="female">
                    <span>Female</span>
                </label>
            </div>

            <div class="input-group">
                <label for="height">Height</label>
                <div class="input-wrapper">
                    <input type="number" id="height" placeholder="175" min="50" max="300">
                    <span class="unit">cm</span>
                </div>
            </div>

            <div class="input-group">
                <label for="weight">Weight</label>
                <div class="input-wrapper">
                    <input type="number" id="weight" placeholder="70" min="20" max="500">
                    <span class="unit">kg</span>
                </div>
            </div>

            <button class="btn-primary" id="calculate-btn">Calculate</button>
        </div>

        <div id="result-card">
            <div class="bmi-score">
                <div class="bmi-value" id="bmi-value">--</div>
                <div class="bmi-status" id="bmi-status">--</div>
            </div>

            <div class="target-section">
                <div class="target-title">Target Weight Analysis</div>
                <div class="target-grid">
                    <!-- 90% Target -->
                    <div class="target-item">
                        <div class="target-label">
                            <span class="target-percent">90% Target</span>
                            <span class="target-desc">90% of Standard</span>
                        </div>
                        <div class="target-value">
                            <div class="target-weight" id="target-90">-- kg</div>
                            <div class="target-diff" id="diff-90">--</div>
                        </div>
                    </div>

                    <!-- 100% Target -->
                    <div class="target-item">
                        <div class="target-label">
                            <span class="target-percent">100% Standard</span>
                            <span class="target-desc">Ideal Body Weight</span>
                        </div>
                        <div class="target-value">
                            <div class="target-weight" id="target-100">-- kg</div>
                            <div class="target-diff" id="diff-100">--</div>
                        </div>
                    </div>

                    <!-- 110% Target -->
                    <div class="target-item">
                        <div class="target-label">
                            <span class="target-percent">110% Allowance</span>
                            <span class="target-desc">110% of Standard</span>
                        </div>
                        <div class="target-value">
                            <div class="target-weight" id="target-110">-- kg</div>
                            <div class="target-diff" id="diff-110">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
