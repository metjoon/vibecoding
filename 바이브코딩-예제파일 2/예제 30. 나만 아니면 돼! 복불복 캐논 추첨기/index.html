<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Cannon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="top-nav">
        <a href="https://nanalab.kr/apps" class="nav-logo-link">
            <img src="https://cdn.jsdelivr.net/gh/NaNaCompany/src_cdn@main/logo/logo.png" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-title">Lucky Cannon</div>
    </nav>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-container">
        <h1 class="title">Lucky Cannon</h1>
        <div class="input-group">
            <textarea id="nameInput"
                placeholder="Enter participant names (separated by commas)&#10;Ex: Alice, Bob, Charlie"></textarea>
        </div>
        <button id="startBtn" class="glow-on-hover">START</button>
    </div>

    <!-- Celebration/Winner Overlay -->
    <div id="winner-overlay" class="hidden">
        <div class="winner-content">
            <h2>The Winner Is</h2>
            <h1 id="winner-name">Name</h1>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
